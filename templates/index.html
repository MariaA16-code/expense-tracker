<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">

    <header>
      <h1>💸 Expense Tracker</h1>
      <p>Track your daily spending</p>
    </header>

    <!-- SUMMARY -->
    <div class="summary-bar">
      <div class="summary-item">
        <span>Total Spent</span>
        <strong id="totalAmount">RM 0.00</strong>
      </div>
      <div class="summary-item">
        <span>Total Entries</span>
        <strong id="totalCount">0</strong>
      </div>
    </div>

    <!-- FORM -->
    <div class="form-card">
      <h2>Add Expense</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" placeholder="e.g. Lunch"/>
        </div>
        <div class="form-group">
          <label>Amount (RM)</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01" min="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Education">Education</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <input type="text" id="note" placeholder="Any extra details"/>
      </div>
      <button onclick="addExpense()">Add Expense</button>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
      <label>Filter by Category:</label>
      <select id="filterCategory" onchange="filterExpenses()">
        <option value="all">All</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Health">Health</option>
        <option value="Education">Education</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Note</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="expenseTable">
          <tr id="emptyRow">
            <td colspan="6" class="empty">No expenses yet. Add one above!</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
